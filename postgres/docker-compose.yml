services:
  postgres:
    container_name: postgres
    image: postgres:14.17-alpine
    restart: always
    environment:
      POSTGRES_DB: pingtower_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - pingtower_network
      
volumes:
  postgres-data:

networks:
  pingtower_network:
    name: pingtower_network
    driver: bridge
