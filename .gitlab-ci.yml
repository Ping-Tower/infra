stages:
  - deploy

.deploy_template:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | base64 -d | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\tPort $TARGET_PORT" > ~/.ssh/config
  script:
    - cp $TARGET_ENV_FILE .env
    - rsync -avz --delete --exclude='.git' . $TARGET_USER@$TARGET_HOST:$TARGET_INFRA_PATH/
    - ssh $TARGET_USER@$TARGET_HOST "
        cd $TARGET_INFRA_PATH &&
        docker network create pingtower_network || true &&
        docker compose -f postgres/docker-compose.yml up -d &&
        docker compose -f redis/docker-compose.yml up -d &&
        docker compose -f clickhouse/docker-compose.yml up -d &&
        docker compose -f rabbitmq/docker-compose.broker.yml up -d &&
        docker compose -f proxy/docker-compose.proxy.yml up -d &&
        docker compose -f logging/docker-compose.logging.yml up -d
      "

deploy_prod:
  extends: .deploy_template
  variables:
    TARGET_PORT: $SSH_PORT_PROD
    TARGET_HOST: $SSH_HOST_PROD
    TARGET_USER: $SSH_USER_PROD
    TARGET_ENV_FILE: $PROD_ENV_FILE
    TARGET_INFRA_PATH: $INFRA_PATH_PROD
  environment:
    name: production
  only:
    - main